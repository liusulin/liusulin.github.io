<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Redirecting to sulinliu.cc</title>
  <meta name="robots" content="noindex">
  <style>body{margin:0;padding:12px;font:16px/1.4 sans-serif}</style>
  <script>
    (function () {
      var target = "https://sulinliu.cc" + window.location.pathname + window.location.search + window.location.hash;
      window.addEventListener("DOMContentLoaded", function () {
        var el = document.getElementById("target-link");
        if (el) el.href = target;
        setTimeout(function () {
          window.location.replace(target);
        }, 1600);
      });
    })();
  </script>
  <noscript>
    <meta http-equiv="refresh" content="0; url=https://sulinliu.cc/">
  </noscript>
</head>

</body>
</html>
