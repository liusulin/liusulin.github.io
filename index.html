<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Redirecting to sulinliu.cc</title>
  <meta name="robots" content="noindex">
  <style>
    :root { color-scheme: light; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Georgia, "Times New Roman", serif;
      background: #f6f6f6;
      color: #222;
    }
    .card {
      max-width: 680px;
      margin: 24px;
      padding: 28px;
      border: 1px solid #d8d8d8;
      background: #fff;
      line-height: 1.55;
    }
    a { color: #0f5ab5; }
  </style>
  <script>
    (function () {
      var target = "https://sulinliu.cc" + window.location.pathname + window.location.search + window.location.hash;
      window.addEventListener("DOMContentLoaded", function () {
        var el = document.getElementById("target-link");
        if (el) el.href = target;
        setTimeout(function () {
          window.location.replace(target);
        }, 1600);
      });
    })();
  </script>
  <noscript>
    <meta http-equiv="refresh" content="0; url=https://sulinliu.cc/">
  </noscript>
</head>
<body>
  <main class="card">
    <h1>This site has moved</h1>
    <p>You are being redirected to the new website.</p>
    <p><a id="target-link" href="https://sulinliu.cc/">Continue to sulinliu.cc</a></p>
  </main>
</body>
</html>
